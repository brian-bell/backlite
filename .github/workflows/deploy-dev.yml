name: Deploy Dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: "main"

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-dev
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      - name: Deploy to Fly.io (dev)
        run: flyctl deploy --config fly.dev.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEV }}
