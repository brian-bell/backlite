name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint
        run: go vet ./...

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -trimpath -o bin/backflow ./cmd/backflow

      - name: Test
        run: go test $(go list ./... | grep -v '/test/blackbox') -race -v -count=1

  blackbox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run black-box tests
        run: go test ./test/blackbox/ -v -count=1 -timeout 120s

  fuzz:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        run: |
          rm -f /tmp/backflow-ci.db
          goose -dir migrations sqlite3 /tmp/backflow-ci.db up

      - name: Build
        run: go build -trimpath -o bin/backflow ./cmd/backflow

      - name: Start server
        run: |
          ./bin/backflow &
          echo $! > /tmp/backflow.pid
        env:
          BACKFLOW_DATABASE_PATH: /tmp/backflow-ci.db
          ANTHROPIC_API_KEY: sk-ant-fuzz-placeholder-not-real
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            if ! kill -0 "$(cat /tmp/backflow.pid)" 2>/dev/null; then
              echo "server process died" && exit 1
            fi
            curl -sf http://localhost:8080/health && break || sleep 1
          done
          curl -sf http://localhost:8080/health || (echo "server did not start" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install schemathesis
        run: pip install schemathesis

      - name: Run schemathesis
        run: |
          schemathesis run api/openapi.yaml \
            --url http://localhost:8080 \
            --checks not_a_server_error \
            --phases examples,coverage,fuzzing,stateful \
            --suppress-health-check filter_too_much \
            --max-examples 20 \
            --seed 42 \
            --output-truncate false \
            --report-vcr-path /tmp/schemathesis-cassette.yaml

      - name: Print failure cassette
        if: failure()
        run: |
          if [ -f /tmp/schemathesis-cassette.yaml ]; then
            grep -B 10 "FAILURE" /tmp/schemathesis-cassette.yaml || cat /tmp/schemathesis-cassette.yaml | tail -200
          else
            echo "No cassette file"
          fi
