openapi: "3.0.3"
info:
  title: Backlite API
  version: "1.0.0"
  description: >
    Backlite is a self-hostable Backlite fork that runs coding agents (Claude
    Code or Codex) in ephemeral local Docker containers. Tasks come in via REST
    API; the orchestrator runs agents, persists artifacts, and cleans up.

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns service health status. Always accessible regardless of API restriction settings.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"

  /debug/stats:
    get:
      operationId: debugStats
      summary: Debug statistics
      description: >
        Returns internal runtime statistics for operational monitoring.
        Requires bearer authentication when API keys are configured.
      responses:
        "200":
          description: Debug statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugStatsEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [stats:read]

  /api/v1/health:
    get:
      operationId: apiHealthCheck
      summary: API health check
      description: Returns service health status. Requires bearer authentication when API keys are configured.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [health:read]

  /api/v1/readings:
    get:
      operationId: listReadings
      summary: List saved readings
      description: >
        Returns saved reading results newest-first with offset pagination.
        Optionally filtered by a free-text query (`q`) that matches against
        title, url, tldr, and summary. Requires bearer authentication when API
        keys are configured.
      parameters:
        - name: limit
          in: query
          description: Maximum number of readings to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of readings to skip for pagination
          required: false
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          description: Free-text query matched case-insensitively against title, url, tldr, and summary.
          required: false
          schema:
            type: string
        - name: tag
          in: query
          description: Restrict results to readings whose tags array contains this tag (case-insensitive exact match).
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Page of saved readings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadingListEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [readings:read]

  /api/v1/readings/{id}:
    get:
      operationId: getReading
      summary: Get a saved reading
      description: Returns one saved reading result by ID. Requires bearer authentication when API keys are configured.
      parameters:
        - name: id
          in: path
          required: true
          description: Reading ID
          schema:
            type: string
      responses:
        "200":
          description: Reading details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadingEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Reading not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [readings:read]

  /api/v1/tasks:
    post:
      operationId: createTask
      summary: Create a new task
      description: >
        Creates a coding or review task. Prompt is the only required field —
        the agent container's Prep stage infers repo_url, target_branch, and
        task_mode from the prompt. If the prompt starts with a GitHub PR URL,
        review mode is auto-detected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
          links:
            GetTask:
              operationId: getTask
              parameters:
                id: $response.body#/data/id
            CancelTask:
              operationId: cancelTask
              parameters:
                id: $response.body#/data/id
            GetTaskLogs:
              operationId: getTaskLogs
              parameters:
                id: $response.body#/data/id
        "400":
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error (e.g. database failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:write]

    get:
      operationId: listTasks
      summary: List tasks
      description: Returns a paginated list of tasks, optionally filtered by status.
      parameters:
        - name: status
          in: query
          description: Filter tasks by status
          required: false
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: limit
          in: query
          description: Maximum number of tasks to return
          required: false
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          description: Number of tasks to skip for pagination
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: List of tasks (empty array when none match)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:read]

  /api/v1/tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID (bf_-prefixed ULID)
          schema:
            type: string
            pattern: "^bf_[0-9A-Z]{26}$"
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:read]

    delete:
      operationId: cancelTask
      summary: Cancel or delete a task
      description: >
        If the task is running, provisioning, or recovering, marks it as
        cancelled (the orchestrator will stop the container). If the task is
        pending, deletes it immediately. Terminal tasks are a no-op.
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID (bf_-prefixed ULID)
          schema:
            type: string
            pattern: "^bf_[0-9A-Z]{26}$"
      responses:
        "204":
          description: Task cancelled or deleted (no body)
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:write]

  /api/v1/tasks/{id}/retry:
    post:
      operationId: retryTask
      summary: Retry a failed, interrupted, or cancelled task
      description: >
        Atomically requeues a task for retry. The task must be in a terminal
        retryable state (failed, interrupted, or cancelled), be marked ready
        for retry (container cleanup complete), and be under the configured
        user retry cap. Returns 409 Conflict if the task is not retryable.
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID (bf_-prefixed ULID)
          schema:
            type: string
            pattern: "^bf_[0-9A-Z]{26}$"
      responses:
        "200":
          description: Task successfully requeued for retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Task cannot be retried (wrong status, not ready, or cap reached)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:write]

  /api/v1/tasks/{id}/logs:
    get:
      operationId: getTaskLogs
      summary: Get task container logs
      description: >
        Streams container logs for a running task. If the task has not yet
        started a container, returns a status/error text message instead.
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID (bf_-prefixed ULID)
          schema:
            type: string
            pattern: "^bf_[0-9A-Z]{26}$"
        - name: tail
          in: query
          description: Number of log lines to return from the end
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Container log output (or status message if not yet running)
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Failed to fetch logs from the container runtime
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:read]

  /api/v1/tasks/{id}/output:
    get:
      operationId: getTaskOutput
      summary: Get persisted agent output log
      description: >
        Returns the agent's stdout log (container_output.log) written by the
        orchestrator to the configured data directory after the task's
        container exits. Returns 404 if the task has not finished, if
        save_agent_output was disabled, or if the file has not yet been
        written.
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID (bf_-prefixed ULID)
          schema:
            type: string
            pattern: "^bf_[0-9A-Z]{26}$"
      responses:
        "200":
          description: Agent output log
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Output not found (task missing, still running, or output gated off)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:read]

  /api/v1/tasks/{id}/output.json:
    get:
      operationId: getTaskOutputJSON
      summary: Get persisted task metadata snapshot
      description: >
        Returns the JSON task metadata snapshot (task.json) written to the
        configured data directory alongside the agent output log after the
        task's container exits.
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID (bf_-prefixed ULID)
          schema:
            type: string
            pattern: "^bf_[0-9A-Z]{26}$"
      responses:
        "200":
          description: Task metadata snapshot
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: API key lacks required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Output not found (task missing, still running, or output gated off)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      security:
        - BearerAuth: [tasks:read]

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  schemas:
    # -------------------------------------------------------------------------
    # Envelope wrappers
    # -------------------------------------------------------------------------

    HealthEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/HealthData"

    HealthData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    DebugStatsEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/DebugStatsData"

    DebugStatsData:
      type: object
      required: [orchestrator, pool, uptime_seconds, runtime, pid]
      properties:
        orchestrator:
          type: object
          required: [running_tasks]
          properties:
            running_tasks:
              type: integer
              minimum: 0
              example: 2
        pool:
          type: object
          required: [acquired_conns, idle_conns, total_conns, max_conns]
          properties:
            acquired_conns:
              type: integer
              example: 3
            idle_conns:
              type: integer
              example: 2
            total_conns:
              type: integer
              example: 5
            max_conns:
              type: integer
              example: 10
        uptime_seconds:
          type: number
          minimum: 0
          example: 3600.5
        runtime:
          type: object
          required: [heap_alloc_bytes, sys_bytes]
          properties:
            heap_alloc_bytes:
              type: integer
              minimum: 0
              example: 12345678
            sys_bytes:
              type: integer
              minimum: 0
              example: 23456789
        pid:
          type: integer
          example: 12345

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "task not found"

    TaskEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Task"

    TaskListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    ReadingListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ReadingPage"

    ReadingEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ReadingDetail"

    ReadingPage:
      type: object
      required: [readings, limit, offset, has_more]
      properties:
        readings:
          type: array
          items:
            $ref: "#/components/schemas/Reading"
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        offset:
          type: integer
          minimum: 0
          example: 0
        has_more:
          type: boolean
          example: false

    # -------------------------------------------------------------------------
    # Core types
    # -------------------------------------------------------------------------

    TaskStatus:
      type: string
      enum:
        - pending
        - provisioning
        - running
        - completed
        - failed
        - interrupted
        - cancelled
        - recovering
      example: pending

    Task:
      type: object
      description: A coding or review task managed by the Backlite orchestrator.
      required:
        - id
        - status
        - task_mode
        - harness
        - create_pr
        - self_review
        - save_agent_output
        - retry_count
        - user_retry_count
        - ready_for_retry
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: ULID with bf_ prefix
          example: "bf_01ARZ3NDEKTSV4RRFFQ69G5FAV"
        status:
          $ref: "#/components/schemas/TaskStatus"
        task_mode:
          type: string
          enum: [auto, code, review, read]
          example: auto
        harness:
          type: string
          enum: [claude_code, codex]
          example: claude_code
        repo_url:
          type: string
          example: "https://github.com/owner/repo"
        branch:
          type: string
          example: ""
        target_branch:
          type: string
          example: ""
        prompt:
          type: string
          example: "Fix the authentication bug in the login handler"
        context:
          type: string
          example: "This is a Go service using chi router"
        model:
          type: string
          example: "claude-sonnet-4-6"
        effort:
          type: string
          enum: [low, medium, high, xhigh]
          example: medium
        agent_image:
          type: string
          description: Docker image used by the orchestrator for this task (reader image for read mode, default agent image otherwise).
          example: "backlite-agent:v1"
        force:
          type: boolean
          description: For read-mode tasks, signals the agent to skip duplicate-detection and the completion handler to upsert instead of insert. No effect for code/review tasks.
          example: false
        max_budget_usd:
          type: number
          minimum: 0
          example: 10.0
        max_runtime_sec:
          type: integer
          minimum: 0
          example: 1800
        max_turns:
          type: integer
          minimum: 0
          example: 200
        create_pr:
          type: boolean
          example: true
        self_review:
          type: boolean
          example: false
        parent_task_id:
          type: string
          nullable: true
          description: ID of the parent task that triggered creation of this chained task. Null for user-submitted tasks.
          example: "bf_01ARZ3NDEKTSV4RRFFQ69G5FAV"
        pr_title:
          type: string
          example: "Fix authentication bug"
        pr_body:
          type: string
          example: "This PR fixes..."
        pr_url:
          type: string
          example: "https://github.com/owner/repo/pull/43"
        save_agent_output:
          type: boolean
          example: true
        output_url:
          type: string
          description: API-relative URL of the persisted agent output log.
          example: "/api/v1/tasks/bf_01HX00000000000000000DEADX/output"
        allowed_tools:
          type: array
          items:
            type: string
          example: ["Bash", "Edit"]
        claude_md:
          type: string
          example: "# Project context\n..."
        env_vars:
          type: object
          additionalProperties:
            type: string
          example:
            CUSTOM_VAR: "value"
        container_id:
          type: string
          example: "abc123def456"
        retry_count:
          type: integer
          minimum: 0
          example: 0
        user_retry_count:
          type: integer
          minimum: 0
          description: Number of user-initiated retries (separate from auto-requeues)
          example: 0
        ready_for_retry:
          type: boolean
          description: Whether the task is ready for user retry (cleanup complete and under cap)
          example: false
        cost_usd:
          type: number
          minimum: 0
          example: 0.42
        elapsed_time_sec:
          type: integer
          minimum: 0
          example: 120
        error:
          type: string
          example: "container exited with code 1"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      additionalProperties: false
      description: >
        Request body for creating a task. Prompt is the only required field —
        the agent container's Prep stage infers repo_url, target_branch, and
        task_mode from the prompt.
      required: [prompt]
      properties:
        prompt:
          type: string
          description: Task instructions for the agent. For read-mode tasks, the URL to summarize.
          example: "Fix the authentication bug in https://github.com/owner/repo"
        task_mode:
          type: string
          enum: [auto, read]
          description: >
            Explicit task mode. Omit (or "auto") to let the agent's Prep stage infer
            code vs. review from the prompt. Set to "read" to create a reading-mode
            task (the prompt is the URL to summarize). Explicit "code" and "review"
            are not accepted — they are always inferred.
          example: read
        force:
          type: boolean
          description: For read-mode tasks, skip duplicate detection and upsert on completion. No effect for other modes.
          example: false
        harness:
          type: string
          enum: [claude_code, codex]
          description: Agent harness to use. Defaults to server configuration.
          example: claude_code
        context:
          type: string
          description: Additional context provided to the agent.
          example: "This service uses chi router and SQLite via database/sql"
        model:
          type: string
          description: LLM model override. Defaults to server configuration.
          example: "claude-sonnet-4-6"
        effort:
          type: string
          enum: [low, medium, high, xhigh]
          description: Agent effort level. Defaults to server configuration.
          example: medium
        max_budget_usd:
          type: number
          minimum: 0
          description: Maximum spend in USD. Defaults to server configuration.
          example: 5.0
        max_runtime_sec:
          type: integer
          minimum: 0
          description: Maximum runtime in seconds. Defaults to server configuration.
          example: 1800
        max_turns:
          type: integer
          minimum: 0
          description: Maximum agent turns. Defaults to server configuration.
          example: 100
        create_pr:
          type: boolean
          description: Whether to open a pull request when done. Defaults to server configuration.
          example: true
        self_review:
          type: boolean
          description: Whether the agent should self-review its output. Defaults to server configuration.
          example: false
        save_agent_output:
          type: boolean
          description: Whether to persist agent output for retrieval via the output endpoints. Defaults to server configuration.
          example: true
        pr_title:
          type: string
          description: Custom pull request title. Defaults to agent-generated title.
          example: "Fix authentication bug"
        pr_body:
          type: string
          description: Custom pull request body. Defaults to agent-generated body.
          example: "This PR fixes the authentication bug by..."
        allowed_tools:
          type: array
          items:
            type: string
          description: Restrict agent to a specific set of tools.
          example: ["Bash", "Edit", "Read"]
        claude_md:
          type: string
          description: Content to inject as CLAUDE.md into the agent container.
          example: "# Project instructions\n..."
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: Additional environment variables to set in the agent container.
          example:
            CUSTOM_SETTING: "value"

    Reading:
      type: object
      description: Saved structured result from a completed read task. Embedding vectors are intentionally not exposed.
      required:
        - id
        - task_id
        - url
        - title
        - tldr
        - tags
        - keywords
        - people
        - orgs
        - novelty_verdict
        - connections
        - summary
        - created_at
      properties:
        id:
          type: string
          example: "bf_01ARZ3NDEKTSV4RRFFQ69G5FAV"
        task_id:
          type: string
          example: "bf_01ARZ3NDEKTSV4RRFFQ69G5FAV"
        url:
          type: string
          format: uri
          example: "https://example.com/article"
        title:
          type: string
          example: "Example Article"
        tldr:
          type: string
          example: "A concise summary of the article."
        tags:
          type: array
          items:
            type: string
          example: ["research", "ai"]
        keywords:
          type: array
          items:
            type: string
          example: ["sqlite", "agents"]
        people:
          type: array
          items:
            type: string
          example: ["Ada Lovelace"]
        orgs:
          type: array
          items:
            type: string
          example: ["Backlite"]
        novelty_verdict:
          type: string
          example: "new"
        connections:
          type: array
          items:
            $ref: "#/components/schemas/ReadingConnection"
        summary:
          type: string
          example: "A longer summary for detail views."
        created_at:
          type: string
          format: date-time

    ReadingConnection:
      type: object
      required: [reading_id, reason]
      properties:
        reading_id:
          type: string
          example: "bf_01ARZ3NDEKTSV4RRFFQ69G5FAV"
        reason:
          type: string
          example: "Covers the same deployment pattern."

    ReadingDetail:
      description: >
        Reading detail used by the reading-library SPA. Extends Reading with
        connections resolved against the readings table (related[]) and a
        snapshot of the task that produced the reading.
      allOf:
        - $ref: "#/components/schemas/Reading"
        - type: object
          required: [related]
          properties:
            related:
              type: array
              items:
                $ref: "#/components/schemas/RelatedReading"
            originating_task:
              nullable: true
              $ref: "#/components/schemas/OriginatingTaskInfo"

    RelatedReading:
      type: object
      required: [reading_id, reason, title, tldr, url, novelty_verdict]
      description: A connection that has been resolved to the linked reading's display fields.
      properties:
        reading_id:
          type: string
        reason:
          type: string
        title:
          type: string
        tldr:
          type: string
        url:
          type: string
          format: uri
        novelty_verdict:
          type: string

    OriginatingTaskInfo:
      type: object
      required: [id, status, task_mode, repo_url, pr_url, output_url, error, created_at]
      description: Snapshot of the task that produced the reading.
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        task_mode:
          type: string
          enum: [auto, code, review, read]
        repo_url:
          type: string
        pr_url:
          type: string
        output_url:
          type: string
        error:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
