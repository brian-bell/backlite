name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint
        run: go vet ./...

      - name: Build
        run: go build -trimpath -o bin/backflow ./cmd/backflow

      - name: Test
        run: go test ./... -v -count=1

  fuzz:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: backflow
          POSTGRES_USER: backflow
          POSTGRES_PASSWORD: backflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        run: goose -dir migrations postgres "postgres://backflow:backflow@localhost:5432/backflow?sslmode=disable" up

      - name: Build
        run: go build -trimpath -o bin/backflow ./cmd/backflow

      - name: Start server
        run: |
          ./bin/backflow &
          echo $! > /tmp/backflow.pid
        env:
          BACKFLOW_DATABASE_URL: "postgres://backflow:backflow@localhost:5432/backflow?sslmode=disable"
          BACKFLOW_MODE: local
          ANTHROPIC_API_KEY: sk-ant-fuzz-placeholder-not-real
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            if ! kill -0 "$(cat /tmp/backflow.pid)" 2>/dev/null; then
              echo "server process died" && exit 1
            fi
            curl -sf http://localhost:8080/health && break || sleep 1
          done
          curl -sf http://localhost:8080/health || (echo "server did not start" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install schemathesis
        run: pip install schemathesis

      - name: Run schemathesis
        run: |
          schemathesis run api/openapi.yaml \
            --url http://localhost:8080 \
            --checks not_a_server_error \
            --phases examples,coverage,fuzzing,stateful \
            --suppress-health-check filter_too_much \
            --max-examples 20 \
            --seed 42

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: fly-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
