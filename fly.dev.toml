app = "backflow-dev"
primary_region = "iad"

[build]
  dockerfile = "docker/server/Dockerfile"

[env]
  BACKFLOW_MODE = "fargate"
  BACKFLOW_RESTRICT_API = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
